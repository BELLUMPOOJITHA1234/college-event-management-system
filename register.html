<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration - CampusEvents</title>
    <link rel="stylesheet" href="/src/index.css">
    <script type="module" src="/src/script.js"></script>
</head>
<body class="p-4 md:p-8 flex flex-col min-h-screen">
    <nav class="max-w-7xl mx-auto w-full flex items-center justify-between mb-12">
        <a href="home.html" class="text-2xl font-bold text-white">CampusEvents</a>
        <div class="flex gap-6 items-center">
            <a href="home.html" class="nav-link">Home</a>
            <a href="login.html" class="btn-gradient !py-2 !px-4 text-sm">Sign In</a>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto w-full flex-grow flex flex-col items-center justify-center">
        <div class="w-full mb-6">
            <button onclick="window.history.back()" class="flex items-center text-white/80 hover:text-white transition-colors font-medium">
                <span class="mr-2 text-xl">←</span> Back
            </button>
        </div>
        <div class="glass-card w-full">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800">Event Registration</h1>
                <p class="text-gray-500 mt-2">Please fill in your details to participate.</p>
            </div>
            
            <form id="registration-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Student Name</label>
                        <input type="text" name="name" placeholder="Full Name" class="input-field" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Roll Number</label>
                        <input type="text" name="rollNumber" placeholder="e.g. 21XX1A0501" class="input-field" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">College Email</label>
                        <input type="email" name="email" placeholder="student@college.edu" class="input-field" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Department</label>
                        <select name="department" class="input-field" required>
                            <option value="">Select Department</option>
                            <option value="CSE">CSE</option>
                            <option value="ECE">ECE</option>
                            <option value="EEE">EEE</option>
                            <option value="MECH">MECH</option>
                            <option value="CIVIL">CIVIL</option>
                            <option value="IT">IT</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Year</label>
                        <select name="year" class="input-field" required>
                            <option value="">Select Year</option>
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3">3rd Year</option>
                            <option value="4">4th Year</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Event Name</label>
                        <input type="text" id="event-name" name="eventName" class="input-field bg-gray-50" readonly required>
                    </div>
                </div>
                
                <button type="submit" class="btn-gradient w-full mt-4">Submit Registration</button>
            </form>

            <script>
                document.getElementById('registration-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    const data = Object.fromEntries(formData.entries());
                    
                    try {
                        const response = await fetch('/api/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        });
                        const result = await response.json();
                        alert(result.message);
                        window.location.href = 'home.html';
                    } catch (error) {
                        console.error('Registration error:', error);
                        alert('Registration failed. Please try again.');
                    }
                });
            </script>
        </div>
    </main>
</body>
</html>
